image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 4.0.0-debian-12-r10

kraft:
  enabled: true

zookeeper:
  enabled: false

listeners:
  client:
    protocol: PLAINTEXT
    sslClientAuth: ""
  controller:
    protocol: PLAINTEXT
    sslClientAuth: ""
  interbroker:
    protocol: PLAINTEXT
    sslClientAuth: ""
  external:
    protocol: PLAINTEXT
    sslClientAuth: ""

controller:
  replicaCount: 1
  controllerOnly: false
  persistence:
    enabled: true
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

broker:
  replicaCount: 0

overrideConfiguration:
  default.replication.factor: 1
  offsets.topic.replication.factor: 1
  transaction.state.log.replication.factor: 1
  transaction.state.log.min.isr: 1
  min.insync.replicas: 1
  group.initial.rebalance.delay.ms: 0

provisioning:
  enabled: true
  topics:
    - name: chat.message.created
      partitions: 1
      replicationFactor: 1
    - name: chat.room.read
      partitions: 1
      replicationFactor: 1
    - name: chat.dlq
      partitions: 1
      replicationFactor: 1
