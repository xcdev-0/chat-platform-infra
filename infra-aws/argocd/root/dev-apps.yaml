apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-dev-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xcdev-0/chat-platform-infra.git
    targetRevision: main
    path: infra-aws/argocd/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
