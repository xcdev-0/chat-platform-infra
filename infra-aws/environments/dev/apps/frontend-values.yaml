# EKS frontend values
# 도메인 없이 ALB 기본 DNS 하나로 검증하기 위해 host 없는 path routing 을 사용한다.

replicaCount: 1

image:
  repository: docker.io/spotifyyyyy/chat-frontend
  tag: cc852e075780
  pullPolicy: Always

imagePullSecrets: []

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: capstone-public
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

backend:
  apiUrl: /api
  wsUrl: /ws/chat

frontend:
  debug: true
